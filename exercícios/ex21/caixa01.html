<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modelo de Caixas</title>
    <style>
        /*box-level*/
      h1 {
        background-color: lightgray;
        height: 300px;
        width: 300px;

        /*ordem: top right bottom left*/

        padding: 20px 10px 15px 5px;

        margin: 20px auto 40px;

        /*ordem: width style color*/

        border: 10px solid black;

        outline: 5px dashed salmon;
      }
      /*inline-level*/
      a {
        border: 10px solid darkgray;
        padding: 10px;
      }
    </style>
  </head>
  <body>
    <h1>Exemplo de caixa box-level</h1>
    <p>
      Parágrafos também são exemplos de box-level, mas os
      <a href="caixa02.html">links são exemplos de caixas inline-level</a>. Vamos ver como
      tudo isso funciona
    </p>
  </body>
</html>
