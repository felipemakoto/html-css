<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradiente em CSS</title>
    <style>
        /*config globais CSS*/
        * {
            height: 100%;
        }
        body {
            background-image: linear-gradient(to bottom, #FFC000, #FE6604,#FF0D4E, #FE0497, #B506EE);
            background-attachment: fixed;
            position: relative;
            }
        .frente {
            position: absolute;
            width: 50px;
            height: 50px;
            top: 50px;
            left: 300px;
            align-items: center;
        }
    </style>
</head>
<body>
    <h1 style="color: white;">Testando Gradiente</h1>
</body>
</html>
